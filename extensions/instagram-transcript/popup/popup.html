<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Transcript</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="20" height="20" rx="5" fill="url(#gradient)"/>
            <circle cx="12" cy="12" r="4" stroke="white" stroke-width="2"/>
            <circle cx="18" cy="6" r="1.5" fill="white"/>
            <defs>
              <linearGradient id="gradient" x1="2" y1="2" x2="22" y2="22">
                <stop stop-color="#E1306C"/>
                <stop offset="1" stop-color="#F77737"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-title">TranscriptHub</span>
          <span class="logo-subtitle">Instagram</span>
        </div>
      </div>
    </header>

    <!-- Current Page Section -->
    <section class="current-page" id="current-page-section" style="display: none;">
      <div class="video-preview">
        <div class="video-placeholder">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>
        </div>
        <div class="video-overlay">
          <button class="generate-btn" id="generate-btn">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.5 3.5L18 2l-1.5 1.5L15 2l-1.5 1.5L12 2l-1.5 1.5L9 2 7.5 3.5 6 2v14H3v3c0 1.66 1.34 3 3 3h12c1.66 0 3-1.34 3-3V2l-1.5 1.5z"/></svg>
            <span id="btn-text">Generate Transcript</span>
          </button>
        </div>
      </div>
      <p class="video-url" id="video-url"></p>
    </section>

    <!-- No Video Section -->
    <section class="no-video" id="no-video-section">
      <div class="no-video-icon">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>
      </div>
      <p class="no-video-text">Open an Instagram video, reel, or TV to generate transcript</p>
    </section>

    <!-- Result Section -->
    <section class="result-section" id="result-section" style="display: none;">
      <div class="result-header">
        <span class="result-title">Transcript</span>
        <button class="copy-btn" id="copy-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
          <span id="copy-text">Copy</span>
        </button>
      </div>
      <div class="result-content" id="result-content"></div>
    </section>

    <!-- Footer -->
    <footer class="popup-footer">
      <button class="visit-site-btn" id="visit-site-btn">
        Visit Website
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
      </button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
